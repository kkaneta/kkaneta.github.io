{{ define "main" }}
<div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
  <h1 class="section-title">{{ .Title }}</h1>
  <div class="prose">
    {{ .Content }}
  </div>
  {{- range .Pages -}}
  <article class="pub-card mt-4">
    <h2><a href="{{ .RelPermalink }}" class="hover:text-sky-600">{{ .Title }}</a></h2>
  </article>
  {{- end -}}
</div>
{{ end }}
